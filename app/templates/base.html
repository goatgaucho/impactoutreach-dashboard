<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ImpactOutreach Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f6f7ff; }
        .gradient-primary { background: linear-gradient(135deg, #6366F1, #8B5CF6); }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 1px 3px rgba(99, 102, 241, 0.08), 0 4px 16px rgba(99, 102, 241, 0.04);
            border: 1px solid #eef2ff;
        }
        .card-lg { border-radius: 1.5rem; }
        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
            padding: 0.625rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn-secondary {
            background: white;
            color: #6366F1;
            padding: 0.625rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            border: 1px solid #e0e7ff;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-secondary:hover { background: #eef2ff; }
        .btn-danger {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.625rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            border: 1px solid #fecaca;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger:hover { background: #fee2e2; }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;
        }
        .badge-draft { background: #f1f5f9; color: #64748b; }
        .badge-active { background: #dcfce7; color: #16a34a; }
        .badge-paused { background: #fef3c7; color: #d97706; }
        .badge-complete { background: #dbeafe; color: #2563eb; }
        .badge-sent { background: #dcfce7; color: #16a34a; }
        .badge-pending { background: #f1f5f9; color: #64748b; }
        .badge-scheduled { background: #e0e7ff; color: #6366f1; }
        .badge-generating { background: #fef3c7; color: #d97706; }
        .badge-bounced { background: #fee2e2; color: #dc2626; }
        .badge-replied { background: #dbeafe; color: #2563eb; }
        .badge-failed { background: #fee2e2; color: #dc2626; }
        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem 1.5rem;
            border: 1px solid #eef2ff;
            box-shadow: 0 1px 3px rgba(99, 102, 241, 0.06);
        }
        .input-field {
            width: 100%;
            padding: 0.625rem 1rem;
            border: 1px solid #e0e7ff;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            color: #020617;
            transition: all 0.2s;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-field:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        textarea.input-field { resize: vertical; min-height: 100px; }
        .table-row:hover { background: #fafaff; }
        .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen">
    {% block navbar %}
    <nav class="gradient-primary">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <span class="text-white font-bold text-lg tracking-tight">ImpactOutreach Admin</span>
            </a>
            <div class="flex items-center gap-2">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/campaigns/new" class="nav-link">New Campaign</a>
                <a href="/logout" class="nav-link">Logout</a>
            </div>
        </div>
    </nav>
    {% endblock %}

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
