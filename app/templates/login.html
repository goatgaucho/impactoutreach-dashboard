<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ImpactOutreach Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f6f7ff; }
        .gradient-primary { background: linear-gradient(135deg, #6366F1, #8B5CF6); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 gradient-primary rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-950 tracking-tight">ImpactOutreach Admin</h1>
            <p class="text-slate-500 mt-1 text-sm">Sign in to manage campaigns</p>
        </div>

        <div style="background: white; border-radius: 1.5rem; box-shadow: 0 1px 3px rgba(99, 102, 241, 0.08), 0 8px 32px rgba(99, 102, 241, 0.06); border: 1px solid #eef2ff; padding: 2rem;">

            {% if error %}
            <div style="background: #fef2f2; border: 1px solid #fecaca; border-radius: 0.75rem; padding: 0.75rem 1rem; margin-bottom: 1.5rem;">
                <p style="color: #dc2626; font-size: 0.875rem; font-weight: 500;">{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="mb-5">
                    <label for="username" style="display: block; font-size: 0.875rem; font-weight: 600; color: #020617; margin-bottom: 0.5rem;">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                        style="width: 100%; padding: 0.75rem 1rem; border: 1px solid #e0e7ff; border-radius: 0.75rem; font-size: 0.875rem; color: #020617; outline: none; font-family: Inter, sans-serif; transition: all 0.2s; box-sizing: border-box;"
                        onfocus="this.style.borderColor='#6366F1'; this.style.boxShadow='0 0 0 3px rgba(99,102,241,0.1)'"
                        onblur="this.style.borderColor='#e0e7ff'; this.style.boxShadow='none'"
                        placeholder="Enter username">
                </div>
                <div class="mb-6">
                    <label for="password" style="display: block; font-size: 0.875rem; font-weight: 600; color: #020617; margin-bottom: 0.5rem;">Password</label>
                    <input type="password" id="password" name="password" required
                        style="width: 100%; padding: 0.75rem 1rem; border: 1px solid #e0e7ff; border-radius: 0.75rem; font-size: 0.875rem; color: #020617; outline: none; font-family: Inter, sans-serif; transition: all 0.2s; box-sizing: border-box;"
                        onfocus="this.style.borderColor='#6366F1'; this.style.boxShadow='0 0 0 3px rgba(99,102,241,0.1)'"
                        onblur="this.style.borderColor='#e0e7ff'; this.style.boxShadow='none'"
                        placeholder="Enter password">
                </div>
                <button type="submit"
                    style="width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #6366F1, #8B5CF6); color: white; border: none; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem; cursor: pointer; font-family: Inter, sans-serif; transition: all 0.2s;"
                    onmouseover="this.style.opacity='0.9'; this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.opacity='1'; this.style.transform='none'">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-slate-400 text-xs mt-6">ImpactOutreach Campaign Management</p>
    </div>
</body>
</html>
